# Docker Compose 编排文件
# 数据分析 Agent - 直接 Docker 部署

version: '3.8'

services:
  # PostgreSQL 数据库
  db:
    image: postgres:15-alpine
    container_name: daa-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change_this_password}
      POSTGRES_DB: data_analysis_agent
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - daa-network
    # 不暴露端口，只在 Docker 内网访问
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 后端 FastAPI 服务
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: daa-backend
    restart: unless-stopped
    env_file:
      - ./server/.env.production
    environment:
      # 覆盖 DATABASE_URL 指向容器内 db 服务
      - DATABASE_URL=postgresql+asyncpg://postgres:${DB_PASSWORD:-change_this_password}@db:5432/data_analysis_agent
    networks:
      - daa-network
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # 前端 Next.js 服务
  frontend:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: daa-frontend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      # 客户端同源访问，NEXT_PUBLIC_API_BASE 留空
      - NEXT_PUBLIC_API_BASE=
      # BFF 层服务端转发到后端（Docker 内网）
      - BACKEND_URL=http://backend:8000
      # 生产环境关闭 dev-token，需要真实 JWT
      - DEV_TOKEN=${DEV_TOKEN:-dev-token}
    networks:
      - daa-network
    expose:
      - "3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # Nginx 反向代理
  nginx:
    image: nginx:alpine
    container_name: daa-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    networks:
      - daa-network
    depends_on:
      - backend
      - frontend

volumes:
  db_data:

networks:
  daa-network:
    driver: bridge
